<h2 class="text-center py-5">Employees</h2>

<div class="card">

  <div class="card-header">
    <p class="fs-5">Overview</p>
  </div>

  <div class="card-body">

    <table class="table table-hover">
      <thead>
      <tr>
        <th>Id</th>
        <th>First Name</th>
        <th>LastName</th>
        <th>Phone</th>
        <th>Email</th>
        <th>Position</th>
        <th>Actions</th>
      </tr>
      </thead>
      <tbody>
      <tr *ngFor="let employee of employees">
        <td>{{ employee.id }}</td>
        <td>{{ employee.firstName }}</td>
        <td>{{ employee.lastName }}</td>
        <td>{{ employee.phone }}</td>
        <td>{{ employee.email }}</td>
        <td>{{ employee.position }}</td>
        <td>
          <div class="d-flex gap-2">
            <button class="btn btn-primary" (click)="editEmployee(employee.id)">Edit</button>
            <button class="btn btn-danger" (click)="deleteEmployee(employee.id)">Delete</button>
          </div>
        </td>
      </tr>
      </tbody>
    </table>

  </div>
</div>
